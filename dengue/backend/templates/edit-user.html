<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../static/backend/css/fonts.css" />
    <link rel="stylesheet" href="../../static/backend/css/edit-user.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Edit User</title>
  </head>
  <body>
    <nav>
      <div class="nav-btn">
        <i class="fa-solid fa-bars"></i>
      </div>
      <div class="title"><span>Edit</span> User</div>
      <div class="profile">
        <i class="fa-solid fa-user" id="pf"></i>
        <div class="profile-modal" id="profile-modal">
          <div class="pf-img">
            <img src="/static/backend/img/user-white.png" alt="" />
          </div>
          <h2>@{{ admin_user }}</h2>
          <p>{{ admin_name }}</p>
          <div style="width: 100%">
            <a href="{% url 'edit-profile' %}" class="pf-btn">Edit Profile</a>
            <a href="{% url 'logout' %}" class="pf-btn">Logout</a>
          </div>
        </div>
      </div>
    </nav>

    <main>
      <div class="main-menu">
        <ul>
          <li>
            <a href="{% url 'admin-panel' %}">
              <i class="fa-solid fa-house"></i>
              <span>Home</span>
            </a>
          </li>
          <li>
            <a href="{% url 'report' %}">
              <i class="fa-solid fa-file-export"></i>
              <span>Report</span>
            </a>
          </li>
          <li>
            <a href="{% url 'log-history' %}">
              <i class="fa-solid fa-user-shield"></i>
              <span>Log History</span>
            </a>
          </li>
          <li>
            <a href="{% url 'forecast' %}">
              <i class="fa-solid fa-cloud-bolt"></i>
              <span>Weather</span>
            </a>
          </li>
          <li>
            <a href="{% url 'admin-message' %}">
              <i class="fa-solid fa-message"></i>
              <span>Message</span>
            </a>
          </li>
          <li>
            <a href="{% url 'manage-user' %}">
              <i class="fa-solid fa-users"></i>
              <span>Manage Users</span>
            </a>
          </li>
        </ul>
      </div>

      <div class="container">
        <div class="section">
          <div class="wrapper">
            <h2>Edit User Data</h2>
            <form method="post" action="">
              {% csrf_token %}
              <div class="label-input">
                <input
                  type="text"
                  name="name"
                  id="name"
                  value="{{ user.name }}"
                  placeholder=" "
                  required
                />
                <label for="name">Full Name</label>
              </div>
              <div class="label-input">
                <input
                  type="text"
                  name="username"
                  id="username"
                  value="{{ user.username }}"
                  placeholder=" "
                  required
                />
                <label for="username">Username</label>
              </div>
              <div class="label-input">
                <input
                  type="email"
                  name="email"
                  id="email"
                  value="{{ user.email }}"
                  placeholder=" "
                  required
                />
                <label for="email">Email</label>
              </div>
              {% if not user.is_admin %}
              <div class="label-input">
                <select name="barangay" id="barangay" required>
                  {% for barangay in barangays %}
                  <option
                    value="{{ barangay.pk }}"
                    {%
                    if
                    user_data.barangay.pk=""
                    ="barangay.pk"
                    %}selected{%
                    endif
                    %}
                  >
                    {{ barangay.name }}
                  </option>
                  {% endfor %}
                </select>
                <p class="label-select">Barangay</p>
              </div>
              {% endif %}
              <div class="actionBtn">
                <button type="submit">Save</button>
                <a href="{% url 'manage-user' %}" class="btn">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
    <script src="../../static/backend/js/menu.js"></script>
  </body>
</html>
