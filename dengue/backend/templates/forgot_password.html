<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - AI Dengue Hotspot Predictor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 15px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        padding: 40px;
        width: 100%;
        max-width: 450px;
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo h1 {
        color: #2c3e50;
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 5px;
      }

      .logo p {
        color: #7f8c8d;
        font-size: 14px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        color: #667eea;
        text-decoration: none;
        margin-bottom: 20px;
        font-weight: 500;
      }

      .back-link:hover {
        text-decoration: underline;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #2c3e50;
        font-weight: 500;
      }

      input[type="email"] {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e8eeff;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s ease;
        background-color: #f8faff;
      }

      input[type="email"]:focus {
        outline: none;
        border-color: #667eea;
        background-color: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      .btn:disabled {
        background: #bdc3c7;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .alert {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }

      .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .loading {
        display: none;
        text-align: center;
        margin: 10px 0;
      }

      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        animation: spin 1s linear infinite;
        display: inline-block;
        margin-right: 10px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .instructions {
        background: #f8f9fa;
        border: 1px solid #e9ecef;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 20px;
        font-size: 14px;
        color: #6c757d;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <h1>🔐 Forgot Password</h1>
        <p>AI Dengue Hotspot Predictor</p>
      </div>

      <a href="{% url 'login' %}" class="back-link">← Back to Login</a>

      {% if messages %} {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %} {% endif %}

      <div id="alert" class="alert"></div>

      <div class="instructions">
        <p>
          Enter your email address and we'll send you an OTP to reset your
          password.
        </p>
      </div>

      <form id="forgotPasswordForm">
        {% csrf_token %}
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email address"
            required
          />
        </div>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          Sending OTP...
        </div>

        <button type="submit" class="btn" id="submitBtn">Send OTP</button>
      </form>
    </div>

    <script>
      document
        .getElementById("forgotPasswordForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const submitBtn = document.getElementById("submitBtn");
          const loading = document.getElementById("loading");
          const alertDiv = document.getElementById("alert");
          const email = document.getElementById("email").value;

          if (!email) {
            showAlert("Please enter your email address", "error");
            return;
          }

          submitBtn.disabled = true;
          loading.style.display = "block";
          alertDiv.style.display = "none";

          const formData = new FormData(this);

          fetch('{% url "send-password-reset-otp" %}', {
            method: "POST",
            body: formData,
            headers: {
              "X-Requested-With": "XMLHttpRequest",
            },
          })
            .then((response) => response.json())
            .then((data) => {
              if (data.success) {
                showAlert(data.message, "success");
                setTimeout(() => {
                  window.location.href =
                    '{% url "verify-password-reset-otp" %}';
                }, 2000);
              } else {
                showAlert(data.message, "error");
              }
            })
            .catch((error) => {
              showAlert("Network error. Please try again.", "error");
            })
            .finally(() => {
              submitBtn.disabled = false;
              loading.style.display = "none";
            });
        });

      function showAlert(message, type) {
        const alertDiv = document.getElementById("alert");
        alertDiv.textContent = message;
        alertDiv.className = `alert alert-${type}`;
        alertDiv.style.display = "block";
      }
    </script>
  </body>
</html>
