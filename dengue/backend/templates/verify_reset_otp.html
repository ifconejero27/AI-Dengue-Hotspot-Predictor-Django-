<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP - AI Dengue Hotspot Predictor</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 15px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        padding: 40px;
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      .logo {
        margin-bottom: 30px;
      }

      .logo h1 {
        color: #2c3e50;
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 5px;
      }

      .logo p {
        color: #7f8c8d;
        font-size: 14px;
      }

      .security-icon {
        font-size: 48px;
        margin-bottom: 20px;
      }

      .instruction {
        color: #5d6d7e;
        margin-bottom: 25px;
        line-height: 1.5;
      }

      .otp-inputs {
        display: flex;
        justify-content: space-between;
        margin-bottom: 25px;
        gap: 10px;
      }

      .otp-input {
        width: 50px;
        height: 50px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        border: 2px solid #e8eeff;
        border-radius: 8px;
        background-color: #f8faff;
        transition: all 0.3s ease;
      }

      .otp-input:focus {
        outline: none;
        border-color: #667eea;
        background-color: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 20px;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      .btn:disabled {
        background: #bdc3c7;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .resend-section {
        margin-bottom: 25px;
      }

      .resend-text {
        color: #7f8c8d;
        margin-bottom: 10px;
      }

      .resend-btn {
        background: none;
        border: none;
        color: #667eea;
        cursor: pointer;
        font-weight: 500;
        text-decoration: underline;
      }

      .resend-btn:disabled {
        color: #bdc3c7;
        cursor: not-allowed;
      }

      .timer {
        color: #e74c3c;
        font-weight: 600;
        margin-top: 5px;
      }

      .alert {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }

      .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        color: #667eea;
        text-decoration: none;
        margin-bottom: 20px;
        font-weight: 500;
      }

      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="{% url 'forgot-password' %}" class="back-link">← Back</a>

      <div class="logo">
        <div class="security-icon">🔐</div>
        <h1>Password Reset</h1>
        <p>AI Dengue Hotspot Predictor</p>
      </div>

      <div class="instruction">
        We've sent a 6-digit verification code to your email.<br />
        Enter it below to reset your password.
      </div>

      {% if messages %} {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %} {% endif %}

      <div id="alert" class="alert"></div>

      <form
        id="otpForm"
        method="POST"
        action="{% url 'verify-password-reset-otp' %}"
      >
        {% csrf_token %}
        <div class="otp-inputs">
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            data-index="1"
            required
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            data-index="2"
            required
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            data-index="3"
            required
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            data-index="4"
            required
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            data-index="5"
            required
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            data-index="6"
            required
          />
        </div>

        <input type="hidden" id="full-otp" name="otp_code" />

        <button type="submit" class="btn" id="verifyBtn">Verify OTP</button>
      </form>

      <div class="resend-section">
        <div class="resend-text">
          Didn't receive the code?
          <span id="timer" class="timer">02:00</span>
        </div>
        <form
          id="resendForm"
          method="POST"
          action="{% url 'resend-password-reset-otp' %}"
          style="display: none"
        >
          {% csrf_token %}
        </form>
        <button type="button" class="resend-btn" id="resendBtn" disabled>
          Resend OTP
        </button>
      </div>
    </div>

    <script>
      const otpInputs = document.querySelectorAll(".otp-input");
      const fullOtpInput = document.getElementById("full-otp");
      const verifyBtn = document.getElementById("verifyBtn");
      const resendBtn = document.getElementById("resendBtn");
      const timerDisplay = document.getElementById("timer");
      const alertDiv = document.getElementById("alert");

      let timeLeft = 120;
      let timerInterval = null;

      function startTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
        }

        timeLeft = 120;
        resendBtn.disabled = true;
        updateTimerDisplay();

        timerInterval = setInterval(() => {
          timeLeft--;
          updateTimerDisplay();

          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timerInterval = null;
            resendBtn.disabled = false;
            timerDisplay.textContent = "00:00";
          }
        }, 1000);
      }

      function updateTimerDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerDisplay.textContent = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
      }

      otpInputs.forEach((input, index) => {
        input.addEventListener("input", (e) => {
          e.target.value = e.target.value.replace(/[^0-9]/g, "");

          if (e.target.value.length === 1) {
            if (index < otpInputs.length - 1) {
              otpInputs[index + 1].focus();
            }
          }

          updateFullOtp();
          validateOtp();
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace") {
            if (!e.target.value && index > 0) {
              otpInputs[index - 1].focus();
            }
          }
        });
      });

      function updateFullOtp() {
        const otp = Array.from(otpInputs)
          .map((input) => input.value)
          .join("");
        fullOtpInput.value = otp;
      }

      function validateOtp() {
        const otp = fullOtpInput.value;
        const isValid = otp.length === 6 && /^\d+$/.test(otp);
        verifyBtn.disabled = !isValid;
        return isValid;
      }

      resendBtn.addEventListener("click", () => {
        showAlert("Sending new OTP...", "success");
        resendBtn.disabled = true;

        fetch(document.getElementById("resendForm").action, {
          method: "POST",
          headers: {
            "X-CSRFToken": getCookie("csrftoken"),
            "X-Requested-With": "XMLHttpRequest",
          },
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.success) {
              showAlert("New OTP sent to your email!", "success");
              startTimer();

              otpInputs.forEach((input) => (input.value = ""));
              updateFullOtp();
              validateOtp();
              otpInputs[0].focus();
            } else {
              showAlert(data.message || "Failed to resend OTP", "error");
              resendBtn.disabled = false;
            }
          })
          .catch((error) => {
            showAlert("Network error. Please try again.", "error");
            resendBtn.disabled = false;
          });
      });

      document
        .getElementById("otpForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const otp = fullOtpInput.value;

          if (!validateOtp()) {
            showAlert("Please enter a valid 6-digit OTP", "error");
            return;
          }

          this.submit();
        });

      function showAlert(message, type) {
        alertDiv.textContent = message;
        alertDiv.className = `alert alert-${type}`;
        alertDiv.style.display = "block";
      }

      function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
          const cookies = document.cookie.split(";");
          for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === name + "=") {
              cookieValue = decodeURIComponent(
                cookie.substring(name.length + 1),
              );
              break;
            }
          }
        }
        return cookieValue;
      }

      document.addEventListener("DOMContentLoaded", function () {
        startTimer();
        otpInputs[0].focus();
      });
    </script>
  </body>
</html>
